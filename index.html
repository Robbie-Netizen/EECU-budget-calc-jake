<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li class="logo"><a href="#"></a></li>
                <div id="textclickables">
                    <li class="home"><a href="#">Home</a></li>
                    <li class="cal"><a href="#">Calculator</a></li>
                    <li class="about"><a href="#">About</a></li>
                </div>
            </ul>
        </nav>
    </header>

    <main>

        <section id="contentContainer">
            <section class="stepContainer">
                <button id="step-0" class="active">1</button>
                <button id="step-1">2</button>
                <button id="step-2">3</button>
                <button id="step-3">4</button>
                <button id="step-4">5</button>
                <button id="step-5">6</button>
                <button id="step-6">7</button>
                <button id="step-7">8</button>
            </section>
            <section id="interactables">
                <section id="chartContainer">
                    <canvas id="chartCanvas"></canvas>
                    <h3>Net Income $</h3>
                    <p id="netIncomeHolder">$<span id="netIncome">000.00</span></p>
                </section>
                <section id="forms">
                    <form id="expensesform" class="active page-0" action="">
                        <h2>Career</h2>
                        <section class="form-inputs">
                            <select name="careers" id="career-list">
                                <option value="default">Select Career</option>
                            </select>
                            <button class="addinput">+Add Input</button>
                            <span id="grossSalary"></span>
                        </section>
                    </form>
                    <!-- Idea is to hide forms not active in css; use a class-->
                    <form action="" class="inactive page-1">
                        <h2>Housing</h2>
                        <!--Add to other forms pls-->
                        <section class="form-inputs">
                            <div class="inputs">
                                <input type="text" class="need-input" placeholder="Mortage" />
                                <input type="text" class="need-input" placeholder="House Insurance" />
                                <input type="text" class="need-input" placeholder="Rent" />
                                <input type="text" class="need-input" placeholder="Utilities" />
                                <input type="text" class="need-input" placeholder="Maintenance" />
                                <input type="text" class="need-input" placeholder="Phone" />
                            </div>
                            <button class="addinput">+Add Input</button>
                        </section>
                    </form>
                    <form action="" class="inactive page-2">
                        <h2>Transportation</h2>
                        <section class="form-inputs">
                            <div class="inputs">
                                <input type="text" class="need-input" placeholder="Car Payment" />
                                <input type="text" class="need-input" placeholder="Car Insurance" />
                                <input type="text" class="need-input" placeholder="Fuel" />
                                <input type="text" class="need-input" placeholder="Repairs" />
                            </div>
                            <button class="addinput">+Add Input</button>
                        </section>
                    </form>
                    <form action="" class="inactive page-3">
                        <h2>Education</h2>
                        <section class="form-inputs">
                            <div class="inputs">
                                <input type="text" class="need-input" placeholder="Tuition" />
                                <input type="text" class="need-input" placeholder="Student Loans" />
                            </div>
                            <button class="addinput">+Add Input</button>
                        </section>
                    </form>
                    <form action="" class="inactive page-4">
                        <h2>Personal</h2>
                        <section class="form-inputs">
                            <div class="inputs">
                                <input type="text" class="need-input" placeholder="Food" />
                                <input type="text" class="need-input" placeholder="Clothing" />
                                <input type="text" class="want-input" placeholder="Entertainment" />
                                <input type="text" class="need-input" placeholder="Medical" />
                            </div>
                            <button class="addinput">+Add Input</button>
                        </section>
                    </form>
                    <form action="" class="inactive page-5">
                        <h2>Savings</h2>
                        <section class="form-inputs">
                            <div class="inputs">
                                <input type="text" class="saving-input" placeholder="Investments" />
                                <input type="text" class="saving-input" placeholder="Emergency Fund" />
                                <input type="text" class="saving-input" placeholder="Retirement" />

                            </div>
                            <button class="addinput">+Add Input</button>
                        </section>
                    </form>
                    <form action="" class="inactive page-6">
                        <h2>
                            Custom Expenses
                            <button class="edit-header">Edit</button>
                        </h2>
                        <section class="form-inputs">
                            <div class="inputs">
                                <input type="text" placeholder="Custom" />

                            </div>
                            <button class="addinput">+Add Input</button>
                        </section>
                    </form>
                    <form action="" class="inactive page-7">
                        <h2>Overview</h2>
                        <table class="needs-wants-savings">
                            <thead>
                                <th></th>
                                <th>Needs (50%)</th>
                                <th>Wants (30%)</th>
                                <th>Savings (20%)</th>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Estimated</td>
                                    <td></td>
                                    <td></td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td id="BLCorner">Spent</td>
                                    <td></td>
                                    <td></td>
                                    <td id="BRCorner"></td>
                                </tr>
                            </tbody>
                        </table>
                    </form>
                </section>

                <!-- Either one button to cycle through steps variable in JS
                    or seperate buttons for each form to go to the next -->
                <button id="nextForm">Next</button>
            </section>
        </section>

    </main>
</body>

</html>
